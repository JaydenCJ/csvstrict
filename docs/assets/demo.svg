<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="548" viewBox="0 0 1060 548" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">
  <!-- Terminal rendering of a real csvstrict run against the in-repo
       examples/postgres-traps.csv and examples/clean.csv fixtures.
       Output text is verbatim, soft-wrapped to fit the image width. -->
  <rect width="1060" height="548" rx="10" fill="#1c2128"/>
  <rect width="1060" height="34" rx="10" fill="#2d333b"/>
  <rect y="24" width="1060" height="10" fill="#2d333b"/>
  <circle cx="20" cy="17" r="6" fill="#f47067"/>
  <circle cx="40" cy="17" r="6" fill="#e0b543"/>
  <circle cx="60" cy="17" r="6" fill="#57ab5a"/>
  <text x="530" y="22" text-anchor="middle" fill="#909dab">csvstrict — the exact byte COPY will choke on</text>

  <g fill="#adbac7">
    <text x="24" y="64"><tspan fill="#6cb6ff">$</tspan> csvstrict check -p postgres examples/postgres-traps.csv</text>

    <text x="24" y="94"><tspan fill="#96d0ff">examples/postgres-traps.csv:3:1</tspan>: <tspan fill="#f47067">error PG002</tspan> [postgres]: line contains only "\.", COPY's end-of-data</text>
    <text x="24" y="116">marker: the 3 record(s) after this line are dropped or the load errors; quote the value as "\." to</text>
    <text x="24" y="138">keep it (record 3, field 1)</text>
    <text x="24" y="162" fill="#768390">     3 | \.</text>
    <text x="24" y="184" fill="#f47067">       | ^^</text>

    <text x="24" y="214"><tspan fill="#96d0ff">examples/postgres-traps.csv:3:3</tspan>: <tspan fill="#f47067">error RFC201</tspan> [rfc4180]: record 3 has 1 field(s), expected 3 from the</text>
    <text x="24" y="236">header (record 3, field 1)</text>
    <text x="24" y="260" fill="#768390">     3 | \.</text>
    <text x="24" y="282" fill="#f47067">       |   ^</text>

    <text x="24" y="312"><tspan fill="#96d0ff">examples/postgres-traps.csv:6:3</tspan>: <tspan fill="#6cb6ff">info PG005</tspan> [postgres]: quoted empty field (loads as empty string)</text>
    <text x="24" y="334">while the file also has unquoted empty fields (load as NULL), e.g. at byte 59; pick one convention or</text>
    <text x="24" y="356">use FORCE_NULL / FORCE_NOT_NULL (record 6, field 2)</text>
    <text x="24" y="380" fill="#768390">     6 | 4,"",0</text>
    <text x="24" y="402" fill="#6cb6ff">       |   ^^</text>

    <text x="24" y="432"><tspan fill="#e0b543">examples/postgres-traps.csv: 2 error(s), 0 warning(s), 1 info(s)</tspan> — 6 record(s), 16 field(s) checked</text>
    <text x="24" y="454">[profiles: rfc4180, postgres]</text>

    <text x="24" y="490"><tspan fill="#6cb6ff">$</tspan> csvstrict check -p excel,bigquery,postgres -q examples/clean.csv</text>
    <text x="24" y="518"><tspan fill="#57ab5a">examples/clean.csv: OK</tspan> — 4 record(s), 16 field(s) checked [profiles: rfc4180, excel, bigquery, postgres]</text>
  </g>
</svg>
